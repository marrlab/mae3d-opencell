# architecture
arch: vit_base
enc_arch: MAEViTEncoder
dec_arch: MAEViTDecoder

# wandb
proj_name: mae2d
run_name: ${proj_name}_${arch}_${dataset}_mask${mask_ratio}
wandb_id: None

# dataset
dataset: opencell
json_list: null  # Not used for OpenCell (uses CSV files instead)
data_path:  /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/opencell_dataset/single_cells/single_cell_dataset
csv_path: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/opencell_dataset/single_cells/metadata/dataset1/

# output
output_dir: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/mae_opencell_2d/${run_name}
ckpt_dir: ${output_dir}/ckpts

# ========================================
# Data Preprocessing & Augmentation (2D)
# ========================================

# ROI size (input size for the model - 2D max-projected images)
roi_y: 176  # Height
roi_x: 176  # Width

# Intensity Normalization (NEW - CRITICAL for multi-channel data)
channel_wise_norm: true  # RECOMMENDED: Set to true for proper multi-channel handling
intensity_augmentation: true  # Apply random intensity scaling/shifting

# Optional: Intensity clipping (keep as None unless specific ranges are needed)
a_min: None
a_max: None
b_min: None
b_max: None

# Spatial Augmentation
RandFlipd_prob: 0.2
RandRotate90d_prob: 0.2

# Intensity Augmentation (applied if intensity_augmentation=true)
RandScaleIntensityd_prob: 0.1
scale_intensity_factor: 0.1
RandShiftIntensityd_prob: 0.1
shift_intensity_offset: 0.1

# trainer
trainer_name: MAE2DTrainer
batch_size: 8  # Per GPU batch size (can use larger batch for 2D)
vis_batch_size: None
start_epoch: 0
warmup_epochs: 1  # Warmup for X epochs
epochs: 10  # Total training epochs
workers: 8
resume: None
cache_rate: 0.0  # Fraction of dataset to cache in RAM (0.0=no caching, 1.0=cache all). Use 0.0 for large datasets.

# model
patchembed: 'PatchEmbed2D'
pos_embed_type: 'sincos'
mask_ratio: 0.90
input_size:
  - ${roi_y}
  - ${roi_x}
patch_size: [8, 8]  # H, W (standard ViT patch size for 2D)
in_chans: 2  # 2 channels for OpenCell
encoder_embed_dim: 384  # Standard ViT-base
encoder_depth: 6  # Standard ViT-base
encoder_num_heads: 6  # Standard ViT-base
decoder_embed_dim: 192  # Half of encoder
decoder_depth: 4
decoder_num_heads: 6

# optimizer
type: adamw
lr: 1.5e-4  # Base learning rate
beta1: 0.9
beta2: 0.95
weight_decay: 0.05
grad_clip: 1.0  # Gradient clipping max norm (0 or None to disable)
gradient_accumulation_steps: 1  # Number of steps to accumulate gradients (1=no accumulation)

# logging
vis_freq: 500  # Visualize MAE reconstructions every N steps
save_freq: 1  # Save checkpoint every epoch
print_freq: 100

# distributed processing (set by train_with_trainer.py at runtime)
gpu: 0  # Will be overridden by LOCAL_RANK
dist_url: null
world_size: 1  # Number of GPUs (will be overridden by torchrun)
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0  # Will be overridden by RANK
ngpus_per_node: 1

# randomness
seed: 42

# debugging
debug: false

# Max projection settings
use_max_projection: true  # Enable max projection along Z-axis
