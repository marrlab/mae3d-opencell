# ========================================
# OpenCell MAE 3D with Channel Cross-Attention and FFT Loss — K-Fold
# ========================================
# Parameters match run2:
#   fft_loss_weight=0.1, warmup_epochs=4, fft_warmup_epochs=0
#
# Submit as a SLURM array job:
#   sbatch --array=0-4 scripts/train_mae3d_cross_attention_fft_kfold_1gpu.sbatch

# Architecture
arch: vit_base_cross_attn_fft
enc_arch: ChannelCrossAttentionEncoder
dec_arch: ChannelCrossAttentionDecoder

# WandB Logging
proj_name: mae3d_cross_attention_fft_kfold
run_name: ${proj_name}_${arch}_${dataset}_mask${mask_ratio}_fft${fft_loss_weight}
wandb_id: None

# Dataset
dataset: opencell
json_list: null
data_path: /path/to/datasets/opencell/opencell_dataset/single_cells/single_cell_dataset
csv_path: /path/to/datasets/opencell/opencell_dataset/single_cells/metadata/dataset1/

# Output (overridden per-fold by the training script)
output_dir: /path/to/datasets/opencell/mae_opencell_3d_cross_attention_fft_kfold/${run_name}
ckpt_dir: ${output_dir}/ckpts

# ========================================
# Data Preprocessing & Augmentation
# ========================================

space_x: 1.0
space_y: 1.0
space_z: 1.0

roi_x: 176
roi_y: 176
roi_z: 100

channel_wise_norm: true
intensity_augmentation: true

a_min: None
a_max: None
b_min: None
b_max: None

RandFlipd_prob: 0.2
RandRotate90d_prob: 0.2

RandScaleIntensityd_prob: 0.1
scale_intensity_factor: 0.1
RandShiftIntensityd_prob: 0.1
shift_intensity_offset: 0.1

# ========================================
# Trainer Configuration
# ========================================

trainer_name: MAE3DChannelCrossAttentionFFTTrainer
batch_size: 8
vis_batch_size: None
start_epoch: 0
warmup_epochs: 4      # run2 value
epochs: 10
workers: 8
resume: None
cache_rate: 0.0

# ========================================
# Model Architecture
# ========================================

patchembed: 'PatchEmbed3D'
pos_embed_type: 'sincos'
mask_ratio: 0.75
input_size:
  - ${roi_z}
  - ${roi_y}
  - ${roi_x}
patch_size: [10, 8, 8]
in_chans: 2

encoder_embed_dim: 384
encoder_depth: 6
encoder_num_heads: 6

decoder_embed_dim: 192
decoder_depth: 4
decoder_num_heads: 6

# ========================================
# Cross-Attention Settings
# ========================================

use_cross_attention: true
cross_attention_type: position_wise

# ========================================
# FFT Loss Settings  (run2 values)
# ========================================

use_fft_loss: true
fft_loss_weight: 0.1      # run2 value
fft_warmup_epochs: 0      # run2 value
fft_rampup_epochs: 2
fft_use_log: true

# ========================================
# Optimizer
# ========================================

type: adamw
lr: 1.5e-4
beta1: 0.9
beta2: 0.95
weight_decay: 0.05
grad_clip: 0.5
gradient_accumulation_steps: 1

# ========================================
# Logging & Checkpointing
# ========================================

vis_freq: 500
save_freq: 1
print_freq: 100

# ========================================
# Distributed Training
# ========================================

gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1

# ========================================
# Other Settings
# ========================================

seed: 42
debug: false
