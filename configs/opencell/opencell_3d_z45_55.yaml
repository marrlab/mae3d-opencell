# ========================================
# OpenCell MAE 3D Configuration - Z-slice 45-55 Experiment
# ========================================
# This config trains MAE3D on a subset of Z-slices (45-55) to test
# whether the middle slices contain sufficient information.
# Uses patch_size (5, 8, 8) for the reduced Z-dimension.

# Architecture
arch: vit_base
enc_arch: MAEViTEncoder
dec_arch: MAEViTDecoder

# WandB Logging
proj_name: mae3d
# run_name: ${proj_name}_${arch}_${dataset}_z45_55_mask${mask_ratio}
run_name: ${proj_name}_${arch}_${dataset}_z10_90_mask${mask_ratio}
wandb_id: None

# Dataset
dataset: opencell
json_list: null
data_path: /path/to/datasets/opencell/opencell_dataset/single_cells/single_cell_dataset
csv_path: /path/to/datasets/opencell/opencell_dataset/single_cells/metadata/dataset1/

# Output
output_dir: /path/to/datasets/opencell/mae_opencell_3d/${run_name}
ckpt_dir: ${output_dir}/ckpts

# ========================================
# Z-Slice Selection
# ========================================
# Select only slices 45-54 (10 slices total, z_slice_end is exclusive)
# Original slices 45-54 map to indices 0-9 in the cropped volume
z_slice_start: 10 # 45
z_slice_end: 90   # 55  # Exclusive, so slices 45-54 (10 slices)

# Visualization Z-slices (indices in cropped volume)
# Index 1 = original slice 46, Index 5 = slice 50, Index 9 = slice 54
vis_z_slices: [20, 40, 60]

# ========================================
# Data Preprocessing & Augmentation
# ========================================

# Spatial resampling (currently disabled with 1.0 spacing)
space_x: 1.0
space_y: 1.0
space_z: 1.0

# ROI size (input size for the model)
# Z is now 10 slices instead of 100
roi_x: 176
roi_y: 176
# roi_z: 10
roi_z: 80

# Intensity Normalization
channel_wise_norm: true
intensity_augmentation: true

# Optional: Intensity clipping
a_min: None
a_max: None
b_min: None
b_max: None

# Spatial Augmentation
RandFlipd_prob: 0.2
RandRotate90d_prob: 0.2

# Intensity Augmentation
RandScaleIntensityd_prob: 0.1
scale_intensity_factor: 0.1
RandShiftIntensityd_prob: 0.1
shift_intensity_offset: 0.1

# ========================================
# Trainer Configuration
# ========================================

trainer_name: MAE3DTrainer
batch_size: 8  # Can use larger batch size with smaller Z dimension
vis_batch_size: None
start_epoch: 0
warmup_epochs: 1
epochs: 10
workers: 8
resume: None
cache_rate: 0.0

# ========================================
# Model Architecture
# ========================================

patchembed: 'PatchEmbed3D'
pos_embed_type: 'sincos'
mask_ratio: 0.75
input_size:
  - ${roi_z}   # 10
  - ${roi_y}   # 176
  - ${roi_x}   # 176
# patch_size: [5, 8, 8]  # 10/5=2 patches in Z, 176/8=22 patches in Y and X
patch_size: [8, 8, 8]  # 10/5=2 patches in Z, 176/8=22 patches in Y and X
in_chans: 2

# Encoder
encoder_embed_dim: 384
encoder_depth: 6
encoder_num_heads: 6

# Decoder
decoder_embed_dim: 192
decoder_depth: 4
decoder_num_heads: 6

# ========================================
# Optimizer
# ========================================

type: adamw
lr: 1.5e-4
beta1: 0.9
beta2: 0.95
weight_decay: 0.05
grad_clip: 1.0
gradient_accumulation_steps: 1

# ========================================
# Logging & Checkpointing
# ========================================

vis_freq: 500
save_freq: 1
print_freq: 100

# ========================================
# Distributed Training
# ========================================

gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1

# ========================================
# Other Settings
# ========================================

seed: 42
debug: false
