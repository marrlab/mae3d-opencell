# ========================================
# OpenCell MAE 2D with Cross-Attention + CLIP-based ESM2 — K-Fold
# ========================================
# Fine-tunes from the 2D FFT k-fold checkpoints using CLIP/InfoNCE loss
# on max-projected images.
#
# Submit as a SLURM array job:
#   sbatch --array=0-4 scripts/train_mae2d_cross_attention_clip_kfold_1gpu.sbatch
#
# Prerequisites:
#   1. Train 2D FFT kfold models:
#        sbatch --array=0-4 scripts/train_mae2d_cross_attention_fft_kfold_1gpu.sbatch
#   2. Create fold-specific ESM2 embeddings (shared with 3D CLIP kfold):
#        python src/create_kfold_esm2_embeddings.py \
#            --global_csv_dir  /ictstr01/.../metadata/dataset1 \
#            --global_esm2_dir /ictstr01/.../esm2_embeddings \
#            --kfold_dir       /ictstr01/.../metadata/kfold5 \
#            --output_dir      /ictstr01/.../esm2_embeddings_kfold5 \
#            --n_folds 5

# Architecture
arch: vit_base_cross_attn_clip_2d
enc_arch: ChannelCrossAttentionEncoder
dec_arch: ChannelCrossAttentionDecoder

# WandB Logging
proj_name: mae2d_cross_attention_clip_kfold
run_name: ${proj_name}_${arch}_${dataset}_esm2
wandb_id: None

# Dataset
dataset: opencell
json_list: null
data_path: /path/to/datasets/opencell/opencell_dataset/single_cells/single_cell_dataset
csv_path: /path/to/datasets/opencell/opencell_dataset/single_cells/metadata/dataset1/

# Output (overridden per-fold by the training script)
output_dir: /path/to/datasets/opencell/mae_opencell_2d_cross_attention_clip_kfold5/${run_name}
ckpt_dir: ${output_dir}/ckpts

# ========================================
# ESM2 Configuration
# ========================================
use_esm2_conditioning: false

esm2_embed_dim: 1280

# Overridden per-fold by the training script via --esm2_embedding_path.
esm2_embedding_path: /path/to/datasets/opencell/esm2_embeddings

# ========================================
# CLIP / InfoNCE Configuration
# ========================================
use_clip_loss: true

clip_embed_dim: 768
clip_weight: 1.0
clip_rampup_epochs: 1
clip_temperature_init: 0.07

# ========================================
# Pre-trained Checkpoint
# ========================================
# Overridden per-fold by the training script via --resume.
resume: None

# ========================================
# Data Preprocessing & Augmentation
# ========================================

space_x: 1.0
space_y: 1.0
space_z: 1.0

roi_x: 176
roi_y: 176
roi_z: 100  # used only to load volumes before max-projection

use_max_projection: true

channel_wise_norm: true
intensity_augmentation: true

a_min: None
a_max: None
b_min: None
b_max: None

RandFlipd_prob: 0.2
RandRotate90d_prob: 0.2

RandScaleIntensityd_prob: 0.1
scale_intensity_factor: 0.1
RandShiftIntensityd_prob: 0.1
shift_intensity_offset: 0.1

# ========================================
# Trainer Configuration
# ========================================

trainer_name: MAE2DChannelCrossAttentionCLIPTrainer
freeze_decoder_during_warmup: true
batch_size: 16
vis_batch_size: None
start_epoch: 0
warmup_epochs: 1
epochs: 5
workers: 8
cache_rate: 0.0

# ========================================
# Model Architecture (2D)
# ========================================

patchembed: 'PatchEmbed2D'
pos_embed_type: 'sincos'
mask_ratio: 0.75
input_size:
  - ${roi_y}
  - ${roi_x}
patch_size: [8, 8]
in_chans: 2

encoder_embed_dim: 384
encoder_depth: 6
encoder_num_heads: 6

decoder_embed_dim: 192
decoder_depth: 4
decoder_num_heads: 6

# ========================================
# Cross-Attention Settings
# ========================================

use_cross_attention: true
cross_attention_type: position_wise

# ========================================
# Optimizer
# ========================================

type: adamw
lr: 1e-5
beta1: 0.9
beta2: 0.95
weight_decay: 0.05
grad_clip: 1.0
gradient_accumulation_steps: 1

# ========================================
# Logging & Checkpointing
# ========================================

vis_freq: 500
save_freq: 1
print_freq: 100

# ========================================
# Distributed Training
# ========================================

gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1

# ========================================
# Other Settings
# ========================================

seed: 42
debug: false
