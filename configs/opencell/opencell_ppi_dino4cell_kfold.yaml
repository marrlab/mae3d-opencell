# PPI metric learning — DINO4Cell (768-dim), k-fold.
#
# Trains a projection head on per-fold DINO4Cell embeddings.
# Prerequisites:
#   1. Run create_subcell_kfold_embeddings.py to generate per-fold .npy files.
#
# Embedding paths and csv_path are overridden per fold via --opts in the SLURM script.

# architecture
arch: PPIMetricSubCell
use_subcell: true

# wandb
proj_name: opencell_ppi_dino4cell_kfold
run_name: ${proj_name}_fold0
wandb_id: None

# dataset — overridden per fold via --opts
dataset: subcell_ppi
embedding_dir: /path/to/datasets/opencell/dino4cell_pca384_kfold5/fold0
csv_path: /path/to/datasets/opencell/opencell_dataset/single_cells/metadata/kfold5/fold0
ppi_csv_path: /path/to/datasets/opencell/opencell_metadata_raw/protein-protein-interactions/opencell-protein-interactions.csv
abundance_csv_path: /path/to/datasets/opencell/opencell_metadata_raw/protein-abundance/opencell-protein-abundance.csv

# PPI filtering thresholds
pval_threshold: 5.0
enrichment_threshold: 2.5
stoichiometry_threshold: 0.05

# Negative sampling
n_abundance_buckets: 10
n_negatives_per_positive: 1

# output — overridden per fold via --opts
output_dir: /path/to/datasets/opencell/ppi_dino4cell_pca384_kfold5/fold0
ckpt_dir: ${output_dir}/ckpts

# trainer
trainer_name: PPISubCellTrainer
batch_size: 256
start_epoch: 0
warmup_epochs: 2
epochs: 100
workers: 4
resume: None
eval_freq: 1

# Embedding dimension (DINO4Cell)
embed_dim: 384

# Projection head
proj_hidden_dim: 512
proj_output_dim: 128
proj_num_layers: 2

# Loss function
loss_type: contrastive
margin: 0.5
temperature: 0.1

# No pretrained weights needed
pretrain: None
freeze_encoder: true

# optimizer
lr: 1e-3
beta1: 0.9
beta2: 0.999
weight_decay: 0.05
gradient_accumulation_steps: 1

# logging
save_freq: 10
print_freq: 50

# distributed
gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1

seed: 42
debug: false
