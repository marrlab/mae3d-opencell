# ========================================
# OpenCell MAE 2D Configuration - FOV (Field-of-View)
# ========================================
# Training on FULL max-projected FOV images (no cropping)
# FOV 2D images: (2, 600, 600) - Max projection of Z-axis

# Architecture
arch: vit_base
enc_arch: MAEViTEncoder
dec_arch: MAEViTDecoder

# WandB Logging
proj_name: mae2d_fov
run_name: ${proj_name}_${arch}_${dataset}
wandb_id: None

# Dataset
dataset: opencell_fov
json_list: null
data_path: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/opencell_raw/

# Output
output_dir: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/mae_opencell_2d_fov/${run_name}
ckpt_dir: ${output_dir}/ckpts

# ========================================
# Data Preprocessing & Augmentation (2D FOV)
# ========================================

# FOV Full Image Size (NO CROPPING)
roi_y: 600  # Full FOV height
roi_x: 600  # Full FOV width

# Intensity Normalization (CRITICAL for multi-channel data)
channel_wise_norm: true
intensity_augmentation: true

# Optional: Intensity clipping
a_min: None
a_max: None
b_min: None
b_max: None

# Spatial Augmentation
RandFlipd_prob: 0.2
RandRotate90d_prob: 0.2

# Intensity Augmentation
RandScaleIntensityd_prob: 0.1
scale_intensity_factor: 0.1
RandShiftIntensityd_prob: 0.1
shift_intensity_offset: 0.1

# ========================================
# Trainer Configuration
# ========================================

trainer_name: MAE2DTrainer
batch_size: 2  # Can use slightly larger batch for 2D vs 3D
vis_batch_size: None
start_epoch: 0
warmup_epochs: 1
epochs: 10
workers: 8
resume: None
cache_rate: 0.0

# ========================================
# Model Architecture (2D FOV)
# ========================================

patchembed: 'PatchEmbed2D'
pos_embed_type: 'sincos'
mask_ratio: 0.75

# Input size: Full FOV 2D (after max projection)
input_size:
  - ${roi_y}   # 600 (full FOV height)
  - ${roi_x}   # 600 (full FOV width)

# Larger patches for larger 2D images
# Options:
# 1. [20, 20] → 900 patches (30×30 grid) - RECOMMENDED
# 2. [15, 15] → 1600 patches (40×40 grid) - more patches
# 3. [12, 12] → 2500 patches (50×50 grid) - highest resolution
patch_size: [20, 20]  # H, W

in_chans: 2  # 2 channels for OpenCell

# Encoder
encoder_embed_dim: 384
encoder_depth: 6
encoder_num_heads: 6

# Decoder
decoder_embed_dim: 192
decoder_depth: 4
decoder_num_heads: 6

# ========================================
# Optimizer
# ========================================

type: adamw
lr: 1.5e-4
beta1: 0.9
beta2: 0.95
weight_decay: 0.05
grad_clip: 1.0
gradient_accumulation_steps: 2  # RECOMMENDED: Use 2 for 2D FOV (batch_size=2, effective_batch=4)

# ========================================
# Logging & Checkpointing
# ========================================

vis_freq: 500
save_freq: 1
print_freq: 100

# ========================================
# Distributed Training
# ========================================

gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1

# ========================================
# Other Settings
# ========================================

seed: 42
debug: false

# ========================================
# Notes: 2D FOV
# ========================================
# - Max projection reduces (51, 2, 600, 600) → (2, 600, 600)
# - Faster training than 3D
# - Larger patches (20×20 vs 8×8 for single cells)
# - No cropping: Uses full 600×600 FOV
