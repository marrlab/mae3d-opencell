# ========================================
# OpenCell MAE 3D with Cross-Attention + CLIP-based ESM2 Integration
# ========================================
# This config trains a MAE3D model with:
# - Standard encoder (no ESM2 conditioning)
# - ESM2 token concatenated in decoder
# - InfoNCE (CLIP-style) contrastive loss between image and ESM2 embeddings
# - Fine-tuned from FFT checkpoint

# Architecture
arch: vit_base_cross_attn_clip
enc_arch: ChannelCrossAttentionEncoder
dec_arch: ChannelCrossAttentionDecoder

# WandB Logging
proj_name: mae3d_cross_attention_clip
run_name: ${proj_name}_${arch}_${dataset}_esm2_run3  # _esm2_run2 # run2  # _run1_subcell
wandb_id: None

# Dataset
dataset: opencell
json_list: null
data_path: /path/to/datasets/opencell/opencell_dataset/single_cells/single_cell_dataset
csv_path: /path/to/datasets/opencell/opencell_dataset/single_cells/metadata/dataset1/

# Output
output_dir: /path/to/datasets/opencell/mae_opencell_3d_cross_attention_clip/${run_name}
ckpt_dir: ${output_dir}/ckpts

# ========================================
# ESM2 Configuration (used in decoder + CLIP)
# ========================================
# No ESM2 conditioning in encoder
use_esm2_conditioning: false

# ESM2 embedding dimension (standard ESM2 output)
esm2_embed_dim: 1280

# Subcell
# esm2_embed_dim: 1536

# Path to ESM2 embeddings directory (must contain train.npy and val.npy)
esm2_embedding_path: /path/to/datasets/opencell/esm2_embeddings

# with Subcell:
# esm2_embedding_path: /path/to/datasets/opencell_embeddings/subcell
# ========================================
# CLIP / InfoNCE Configuration
# ========================================
use_clip_loss: true

# Shared projection dimension for image and ESM2 embeddings
clip_embed_dim: 768  # best run: 256

# CLIP loss weight (multiplied with InfoNCE loss)
clip_weight: 1.0

# Number of epochs to linearly ramp up CLIP loss weight (from 0 to clip_weight)
clip_rampup_epochs: 1  # 5  # 2  # best maybe 1

# Initial temperature for CLIP (learnable, init to 1/clip_temperature_init)
clip_temperature_init: 0.07  # 0.02  # best maybe 0.07

# ========================================
# Pre-trained Checkpoint
# ========================================
# FFT checkpoint for fine-tuning (standard encoder blocks match)
resume: /path/to/datasets/opencell/mae_opencell_3d_cross_attention_fft/mae3d_cross_attention_fft_vit_base_cross_attn_fft_opencell_mask0.75_fft0.1_run2/mae3d_cross_attention_fft_vit_base_cross_attn_fft_opencell_mask0.75_fft0.1_run2/ckpts/checkpoint_0009.pth.tar

# ========================================
# Data Preprocessing & Augmentation
# ========================================

# Spatial resampling
space_x: 1.0
space_y: 1.0
space_z: 1.0

# ROI size (input size for the model)
roi_x: 176
roi_y: 176
roi_z: 100

# Intensity Normalization
channel_wise_norm: true
intensity_augmentation: true

# Intensity clipping
a_min: None
a_max: None
b_min: None
b_max: None

# Spatial Augmentation
RandFlipd_prob: 0.2
RandRotate90d_prob: 0.2

# Intensity Augmentation
RandScaleIntensityd_prob: 0.1
scale_intensity_factor: 0.1
RandShiftIntensityd_prob: 0.1
shift_intensity_offset: 0.1

# ========================================
# Trainer Configuration
# ========================================

trainer_name: MAE3DChannelCrossAttentionCLIPTrainer
freeze_decoder_during_warmup: true
batch_size: 8  # Per GPU batch size
vis_batch_size: None
start_epoch: 0
warmup_epochs: 1  # 2  # maybe best 1
epochs: 5  # 10   # maybe best 5
workers: 8
cache_rate: 0.0

# ========================================
# Model Architecture
# ========================================

patchembed: 'PatchEmbed3D'
pos_embed_type: 'sincos'
mask_ratio: 0.75
input_size:
  - ${roi_z}
  - ${roi_y}
  - ${roi_x}
patch_size: [10, 8, 8]  # S_Z, S_Y, S_X
in_chans: 2  # OpenCell has 2 channels: nucleus and protein

# Encoder
encoder_embed_dim: 384
encoder_depth: 6
encoder_num_heads: 6

# Decoder
decoder_embed_dim: 192
decoder_depth: 4
decoder_num_heads: 6

# ========================================
# Cross-Attention Settings
# ========================================

use_cross_attention: true
cross_attention_type: position_wise

# ========================================
# Optimizer
# ========================================

type: adamw
lr: 1e-5 # 1.4e-4  # maybe best 1e-5
beta1: 0.9
beta2: 0.95
weight_decay: 0.05
grad_clip: 1.0
gradient_accumulation_steps: 1

# ========================================
# Logging & Checkpointing
# ========================================

vis_freq: 500
save_freq: 1
print_freq: 100

# ========================================
# Distributed Training
# ========================================

gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1

# ========================================
# Other Settings
# ========================================

seed: 42
debug: false
