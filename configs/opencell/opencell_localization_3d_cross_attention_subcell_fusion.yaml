# ========================================
# OpenCell Localization with MAE3D + SubCell Fusion
# ========================================
# This config trains a classifier that combines:
# - MAE3D cross-attention encoder features (768-dim)
# - SubCell embeddings (1536-dim)
# - Concatenated → 2304-dim → classification head

# Architecture
arch: ViT3DCrossAttentionSubCellClassifier
use_2d: false

# Cross-attention settings
cross_attention_type: 'position_wise'
pool_mode: 'concat'  # MAE3D: concat two channels → 768-dim

# Fusion settings
subcell_embed_dim: 1536
subcell_proj_dim: null  # No projection (use full 1536-dim)
fusion_type: 'concat'  # Concat MAE3D (768) + SubCell (1536) → 2304

# WandB
proj_name: opencell_localization_fusion
run_name: ${proj_name}_mae3d_subcell_concat
wandb_id: None

# Dataset
dataset: opencell_localization_fusion
csv_path: /path/to/datasets/opencell/opencell_dataset/single_cells/metadata/dataset1/
localization_csv_path: /path/to/datasets/opencell/opencell_metadata_raw/protein-localization-annotations/opencell-localization-annotations.csv

# SubCell embeddings
embedding_path: /path/to/datasets/opencell_embeddings/subcell

# MAE embeddings (optional - for fast training when encoder is frozen)
# Set to null to use image mode (run images through encoder)
# Set to path to use embedding mode (load precomputed embeddings, much faster)
mae_embedding_path: null

# Output
output_dir: /path/to/datasets/opencell/localization_results/${run_name}
ckpt_dir: ${output_dir}/ckpts

# ========================================
# Data Preprocessing & Augmentation
# ========================================

channel_wise_norm: true
intensity_augmentation: true

a_min: None
a_max: None
b_min: None
b_max: None

RandFlipd_prob: 0.2
RandRotate90d_prob: 0.2

RandScaleIntensityd_prob: 0.1
scale_intensity_factor: 0.1
RandShiftIntensityd_prob: 0.1
shift_intensity_offset: 0.1

# ========================================
# Trainer Configuration
# ========================================

trainer_name: LocalizationFusionTrainer
batch_size: 8
start_epoch: 0
warmup_epochs: 2
epochs: 50
workers: 8
resume: None
cache_rate: 0.0
eval_freq: 1

# ========================================
# Model Architecture (must match pretrained MAE3D)
# ========================================

input_size:
  - 100  # D
  - 176  # H
  - 176  # W
patch_size: [10, 8, 8]
in_chans: 2
num_classes: 17
encoder_embed_dim: 384
encoder_depth: 6
encoder_num_heads: 6
pos_embed_type: 'sincos'
use_global_pool: true
drop_path: 0.1

# Grade weights
grade_weights:
  3: 1.0
  2: 0.5
  1: 0.25

# Pretrained MAE3D cross-attention weights
pretrain: /path/to/datasets/opencell/mae_opencell_3d_cross_attention/mae3d_cross_attention_vit_base_cross_attn_opencell_mask0.75/mae3d_cross_attention_vit_base_cross_attn_opencell_mask0.75/ckpts/checkpoint_0009.pth.tar

# Freeze MAE3D encoder (linear probing) or fine-tune
freeze_encoder: true

# ========================================
# Optimizer
# ========================================

lr: 1e-3  # Higher for linear probing (use 1e-4 for fine-tuning)
beta1: 0.9
beta2: 0.999
weight_decay: 0.05
gradient_accumulation_steps: 1

# ========================================
# Logging & Checkpointing
# ========================================

save_freq: 5
print_freq: 50

# ========================================
# Distributed Training
# ========================================

gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1

# ========================================
# Other Settings
# ========================================

seed: 42
debug: false
