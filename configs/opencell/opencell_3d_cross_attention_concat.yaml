# ========================================
# OpenCell MAE 3D with Cross-Attention, FFT Loss, and External Embedding Concatenation
# ========================================
# This config fine-tunes a pre-trained MAE3D with cross-attention model
# by injecting external embeddings (ESM2, SubCell) as additional tokens in the decoder.

# Architecture
arch: vit_base_cross_attn_concat
enc_arch: ChannelCrossAttentionEncoder
dec_arch: ChannelCrossAttentionDecoder

# WandB Logging
proj_name: mae3d_cross_attention_concat
run_name: ${proj_name}_${arch}_${dataset}_finetune_fuse_subcell # esm2  # dino4cell
wandb_id: None

# Dataset
dataset: opencell
json_list: null
data_path: /path/to/datasets/opencell/opencell_dataset/single_cells/single_cell_dataset
csv_path: /path/to/datasets/opencell/opencell_dataset/single_cells/metadata/dataset1/

# External embeddings for decoder concatenation
# ESM2 protein embeddings
esm2_embedding_path: /path/to/datasets/opencell/esm2_embeddings/

# SubCell embeddings (for concat, separate from distillation embedding_path)
concat_embedding_path: /path/to/datasets/opencell_embeddings/subcell
# concat_embedding_path: /path/to/datasets/opencell_embeddings/dino4cells_wtc/

# Output
output_dir: /path/to/datasets/opencell/mae_opencell_3d_cross_attention_concat/${run_name}
ckpt_dir: ${output_dir}/ckpts

# ========================================
# Pre-trained Checkpoint
# ========================================
# Path to pre-trained MAE3D cross-attention + FFT checkpoint
resume: /path/to/datasets/opencell/mae_opencell_3d_cross_attention_fft/mae3d_cross_attention_fft_vit_base_cross_attn_fft_opencell_mask0.75_fft0.1_run2/mae3d_cross_attention_fft_vit_base_cross_attn_fft_opencell_mask0.75_fft0.1_run2/ckpts/checkpoint_0009.pth.tar

# ========================================
# Data Preprocessing & Augmentation
# ========================================

# Spatial resampling
space_x: 1.0
space_y: 1.0
space_z: 1.0

# ROI size (input size for the model)
roi_x: 176
roi_y: 176
roi_z: 100

# Intensity Normalization
channel_wise_norm: true
intensity_augmentation: true

# Intensity clipping
a_min: None
a_max: None
b_min: None
b_max: None

# Spatial Augmentation
RandFlipd_prob: 0.2
RandRotate90d_prob: 0.2

# Intensity Augmentation
RandScaleIntensityd_prob: 0.1
scale_intensity_factor: 0.1
RandShiftIntensityd_prob: 0.1
shift_intensity_offset: 0.1

# ========================================
# Trainer Configuration
# ========================================

trainer_name: MAE3DChannelCrossAttentionConcatTrainer
batch_size: 8  # Per GPU batch size
vis_batch_size: None
start_epoch: 0
warmup_epochs: 2
epochs: 10
workers: 8
cache_rate: 0.0

# ========================================
# Model Architecture
# ========================================

patchembed: 'PatchEmbed3D'
pos_embed_type: 'sincos'
mask_ratio: 0.75
input_size:
  - ${roi_z}
  - ${roi_y}
  - ${roi_x}
patch_size: [10, 8, 8]  # S_Z, S_Y, S_X
in_chans: 2  # OpenCell has 2 channels: nucleus and protein

# Encoder (must match pre-trained model)
encoder_embed_dim: 384
encoder_depth: 6
encoder_num_heads: 6

# Decoder (must match pre-trained model)
decoder_embed_dim: 192
decoder_depth: 4
decoder_num_heads: 6

# ========================================
# Cross-Attention Settings
# ========================================

use_cross_attention: true
cross_attention_type: position_wise

# ========================================
# External Embedding Concatenation Settings
# ========================================

# ESM2 protein embeddings
concat_esm2: true
esm2_embed_dim: 1280
num_esm2_tokens: 1

# SubCell embeddings
concat_subcell: true
subcell_embed_dim: 1536
num_subcell_tokens: 1

# ========================================
# FFT Loss Settings
# ========================================

use_fft_loss: true
fft_loss_weight: 0.1
fft_use_log: true
fft_warmup_epochs: 1
fft_rampup_epochs: 1

# ========================================
# Optimizer
# ========================================

type: adamw
lr: 1.5e-5  # Lower learning rate for fine-tuning
beta1: 0.9
beta2: 0.95
weight_decay: 0.05
grad_clip: 1.0
gradient_accumulation_steps: 1

# ========================================
# Logging & Checkpointing
# ========================================

vis_freq: 500
save_freq: 1
print_freq: 100

# ========================================
# Distributed Training
# ========================================

gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1

# ========================================
# Other Settings
# ========================================

seed: 42
debug: false
