# Embedding-based localization — SubCell (1536-dim), k-fold.
#
# Trains a linear head on per-fold SubCell embeddings.
# Prerequisites:
#   1. Run create_subcell_kfold_embeddings.py to generate per-fold .npy files.
#
# Embedding paths and csv_path are overridden per fold via --opts in the SLURM script.

# architecture
arch: SubCellMLPClassifier

# wandb
proj_name: opencell_localization_subcell_kfold
run_name: ${proj_name}_fold0
wandb_id: None

# dataset paths — overridden per fold via --opts
csv_path: /path/to/datasets/opencell/opencell_dataset/single_cells/metadata/kfold5/fold0
localization_csv_path: /path/to/datasets/opencell/opencell_metadata_raw/protein-localization-annotations/opencell-localization-annotations.csv

# subcell embedding paths — overridden per fold via --opts
embedding_dir: /path/to/datasets/opencell/subcell_pca384_kfold5/fold0
train_embedding_path: ${embedding_dir}/train.npy
val_embedding_path: ${embedding_dir}/val.npy
test_embedding_path: ${embedding_dir}/test.npy

# output — overridden per fold via --opts
output_dir: /path/to/datasets/opencell/localization_subcell_pca384_kfold5/fold0
ckpt_dir: ${output_dir}/ckpts

# model architecture
input_dim: 384
hidden_dim: 512
num_classes: 17
num_layers: 1
dropout: 0.0

# grade weights
grade_weights:
  3: 1.0
  2: 0.5
  1: 0.25

# trainer
trainer_name: SubCellLocalizationTrainer
batch_size: 128
start_epoch: 0
warmup_epochs: 5
epochs: 100
workers: 4
resume: None
eval_freq: 1

# optimizer
lr: 1e-3
beta1: 0.9
beta2: 0.999
weight_decay: 0.05
gradient_accumulation_steps: 1

# logging
save_freq: 10
print_freq: 50

# distributed
gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1

seed: 42
debug: false
