# Vision-Language Model (VLM) 2D configuration for OpenCell
#
# Uses 2D MAE encoder with max-projected images
#
# Usage:
#   Stage 1 (projection only):
#     python src/train_vlm.py --config configs/opencell/vlm_2d.yaml --stage 1
#
#   Stage 2 (fine-tune with LoRA):
#     python src/train_vlm.py --config configs/opencell/vlm_2d.yaml --stage 2 \
#         --resume outputs/vlm_2d/stage1/best

# ============================================================================
# MAE Vision Encoder (pretrained 2D)
# ============================================================================
mae_config: configs/opencell/opencell_2d.yaml
mae_checkpoint: /path/to/your/mae2d_checkpoint.pth.tar  # UPDATE THIS

# Use 2D model
model_type: 2d
use_3d: false
use_max_projection: true  # Max project z-stack to 2D

# ============================================================================
# Language Model
# ============================================================================
llm_name: mistralai/Mistral-7B-v0.1

# ============================================================================
# VLM Architecture
# ============================================================================
num_vision_tokens: 64
projection_type: mlp
num_projection_layers: 2
projection_dropout: 0.1

# LoRA settings (Stage 2)
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

# ============================================================================
# Data (same JSONL files as 3D)
# ============================================================================
train_jsonl: /path/to/datasets/opencell/opencell_dataset/single_cells/metadata/dataset1/vlm_dataset/train_expanded.jsonl
val_jsonl: /path/to/datasets/opencell/opencell_dataset/single_cells/metadata/dataset1/vlm_dataset/val_expanded.jsonl

expanded_format: true
max_length: 512

# ============================================================================
# Training
# ============================================================================
batch_size: 8              # Can use larger batch size with 2D (less memory)
epochs: 10
lr: 1.0e-4
weight_decay: 0.01
warmup_ratio: 0.1
grad_clip: 1.0

# ============================================================================
# Logging & Checkpointing
# ============================================================================
output_dir: /path/to/datasets/opencell/vlm_2d_outputs
wandb_project: cell-vlm-2d

log_interval: 50
save_interval: 5
sample_interval: 5

# ============================================================================
# Hardware
# ============================================================================
num_workers: 4
seed: 42
