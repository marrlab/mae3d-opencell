# ========================================
# OpenCell MAE 3D with Cross-Attention, ESM2 Conditioning, and Distillation
# ========================================
# This config trains a MAE3D model with optional:
# - ESM2 protein embedding conditioning (cross-attention in encoder)
# - SubCell distillation
#
# Both features are independently toggleable via flags below.

# Architecture
arch: vit_base_cross_attn_esm2
enc_arch: ChannelCrossAttentionEncoder
dec_arch: ChannelCrossAttentionDecoder

# WandB Logging
proj_name: mae3d_cross_attention_esm2
run_name: ${proj_name}_${arch}_${dataset}_run4  # _run2
wandb_id: None

# Dataset
dataset: opencell
json_list: null
data_path: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/opencell_dataset/single_cells/single_cell_dataset
csv_path: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/opencell_dataset/single_cells/metadata/dataset1/

# Output
output_dir: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/mae_opencell_3d_cross_attention_esm2/${run_name}
ckpt_dir: ${output_dir}/ckpts

# ========================================
# ESM2 Conditioning (optional)
# ========================================
# Set to true to enable ESM2 protein embedding conditioning
use_esm2_conditioning: true

# ESM2 embedding dimension (standard ESM2 output)
esm2_embed_dim: 1280

# Path to ESM2 embeddings directory (must contain train.npy and val.npy)
esm2_embedding_path: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/esm2_embeddings

# ========================================
# SubCell Distillation (optional)
# ========================================
# Set to true to enable SubCell distillation
use_subcell_distillation: false

# Teacher (SubCell) embedding dimension
teacher_embed_dim: 1536

# Path to SubCell embeddings directory (must contain train.npy and val.npy)
embedding_path: null

# Distillation loss type: 'mse' (Euclidean) or 'cosine' (Cosine similarity)
distill_loss_type: cosine

# Distillation loss weight (multiplied with distillation loss)
distill_weight: 1.0

# Number of epochs to ramp up distillation weight (linear from 0 to distill_weight)
distill_rampup_epochs: 1

# Freeze decoder during ramp-up epochs (focus encoder on distillation alignment first)
freeze_decoder_during_rampup: true

# Student embedding extraction (matches ViT3DCrossAttentionClassifier)
distill_use_global_pool: true
distill_pool_mode: concat

# ========================================
# Pre-trained Checkpoint (optional)
# ========================================
# Path to pre-trained MAE3D cross-attention checkpoint for fine-tuning
# run_2: resume: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/mae_opencell_3d_cross_attention/mae3d_cross_attention_vit_base_cross_attn_opencell_mask0.75/mae3d_cross_attention_vit_base_cross_attn_opencell_mask0.75/ckpts/checkpoint_0009.pth.tar  # null
resume: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/mae_opencell_3d_cross_attention_fft/mae3d_cross_attention_fft_vit_base_cross_attn_fft_opencell_mask0.75_fft0.1_run2/mae3d_cross_attention_fft_vit_base_cross_attn_fft_opencell_mask0.75_fft0.1_run2/ckpts/checkpoint_0009.pth.tar

# ========================================
# Data Preprocessing & Augmentation
# ========================================

# Spatial resampling
space_x: 1.0
space_y: 1.0
space_z: 1.0

# ROI size (input size for the model)
roi_x: 176
roi_y: 176
roi_z: 100

# Intensity Normalization
channel_wise_norm: true
intensity_augmentation: true

# Intensity clipping
a_min: None
a_max: None
b_min: None
b_max: None

# Spatial Augmentation
RandFlipd_prob: 0.2
RandRotate90d_prob: 0.2

# Intensity Augmentation
RandScaleIntensityd_prob: 0.1
scale_intensity_factor: 0.1
RandShiftIntensityd_prob: 0.1
shift_intensity_offset: 0.1

# ========================================
# Trainer Configuration
# ========================================

trainer_name: MAE3DChannelCrossAttentionESM2Trainer
freeze_decoder_during_warmup: true
batch_size: 8  # Per GPU batch size
vis_batch_size: None
start_epoch: 0
warmup_epochs: 1
epochs: 5   # run_2: 8  # 10
workers: 8
cache_rate: 0.0

# ========================================
# Model Architecture
# ========================================

patchembed: 'PatchEmbed3D'
pos_embed_type: 'sincos'
mask_ratio: 0.75
input_size:
  - ${roi_z}
  - ${roi_y}
  - ${roi_x}
patch_size: [10, 8, 8]  # S_Z, S_Y, S_X
in_chans: 2  # OpenCell has 2 channels: nucleus and protein

# Encoder
encoder_embed_dim: 384
encoder_depth: 6
encoder_num_heads: 6

# Decoder
decoder_embed_dim: 192
decoder_depth: 4
decoder_num_heads: 6

# ========================================
# Cross-Attention Settings
# ========================================

use_cross_attention: true
cross_attention_type: position_wise

# ========================================
# Optimizer
# ========================================

type: adamw
lr: 1e-5  # 1.5e-4
beta1: 0.9
beta2: 0.95
weight_decay: 0.05
grad_clip: 1.0
gradient_accumulation_steps: 1

# ========================================
# Logging & Checkpointing
# ========================================

vis_freq: 500
save_freq: 1
print_freq: 100

# ========================================
# Distributed Training
# ========================================

gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1

# ========================================
# Other Settings
# ========================================

seed: 42
debug: false
