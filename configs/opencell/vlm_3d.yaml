# Vision-Language Model (VLM) configuration for OpenCell
#
# Usage:
#   Stage 1 (projection only):
#     python src/train_vlm.py --config configs/opencell/vlm.yaml --stage 1
#
#   Stage 2 (fine-tune with LoRA):
#     python src/train_vlm.py --config configs/opencell/vlm.yaml --stage 2 \
#         --resume outputs/vlm/stage1/best

# ============================================================================
# MAE Vision Encoder (pretrained)
# ============================================================================
mae_config: configs/opencell/opencell_3d.yaml
mae_checkpoint: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/mae_opencell_3d_cross_attention/mae3d_cross_attention_vit_base_cross_attn_opencell_mask0.75/mae3d_cross_attention_vit_base_cross_attn_opencell_mask0.75/ckpts/checkpoint_0009.pth.tar  # UPDATE THIS

# ============================================================================
# Language Model
# ============================================================================
llm_name: mistralai/Mistral-7B-v0.1
# Alternatives:
#   - meta-llama/Llama-2-7b-hf
#   - lmsys/vicuna-7b-v1.5
#   - microsoft/phi-2 (smaller, 2.7B)

# ============================================================================
# VLM Architecture
# ============================================================================
num_vision_tokens: 64       # Number of visual tokens (more = finer detail, slower)
projection_type: mlp        # 'linear' or 'mlp'
num_projection_layers: 2    # Number of MLP layers
projection_dropout: 0.1

# LoRA settings (Stage 2)
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

# ============================================================================
# Data
# ============================================================================
# UPDATE THESE PATHS after running create_vlm_dataset.py
train_jsonl: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/opencell_dataset/single_cells/metadata/dataset1/vlm_dataset/train_expanded.jsonl
val_jsonl: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/opencell_dataset/single_cells/metadata/dataset1/vlm_dataset/val_expanded.jsonl

expanded_format: true       # Use expanded JSONL (one QA per line)
use_3d: true               # Use full 3D volumes
max_length: 512            # Max sequence length

# ============================================================================
# Training - Stage 1 (Projection only)
# ============================================================================
# These are defaults, can be overridden per stage

batch_size: 4              # Adjust based on GPU memory
epochs: 10
lr: 1.0e-4
weight_decay: 0.01
warmup_ratio: 0.1
grad_clip: 1.0

# ============================================================================
# Training - Stage 2 overrides (use via command line)
# ============================================================================
# Recommended for Stage 2:
#   --lr 2e-5
#   --epochs 5
#   --batch_size 2

# ============================================================================
# Logging & Checkpointing
# ============================================================================
output_dir: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/vlm_outputs
wandb_project: cell-vlm

log_interval: 50           # Log every N batches
save_interval: 1           # Save checkpoint every N epochs
save_every_n_batches: 1000  # Save mid-epoch checkpoint every N batches
sample_interval: 5         # Generate samples every N epochs

# ============================================================================
# Hardware
# ============================================================================
num_workers: 4
seed: 42
