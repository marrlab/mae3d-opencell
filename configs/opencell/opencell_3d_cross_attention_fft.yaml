# ========================================
# OpenCell MAE 3D with Channel Cross-Attention and FFT Loss
# ========================================
# This config trains a 3D Masked Autoencoder with:
# - Cross-attention between channels (nucleus and protein)
# - FFT loss on full reconstructions for better frequency learning
#
# FFT Loss Schedule (decoupled from LR warmup):
# - fft_warmup_epochs: No FFT loss (MSE only)
# - fft_rampup_epochs: Linear ramp from 0 to fft_loss_weight
# - Remaining epochs: Full fft_loss_weight

# Architecture
arch: vit_base_cross_attn_fft
enc_arch: ChannelCrossAttentionEncoder
dec_arch: ChannelCrossAttentionDecoder

# WandB Logging
proj_name: mae3d_cross_attention_fft
run_name: ${proj_name}_${arch}_${dataset}_mask${mask_ratio}_fft${fft_loss_weight}_run3    # run2
wandb_id: None

# Dataset
dataset: opencell
json_list: null
data_path: /path/to/datasets/opencell/opencell_dataset/single_cells/single_cell_dataset
csv_path: /path/to/datasets/opencell/opencell_dataset/single_cells/metadata/dataset1/

# Output
output_dir: /path/to/datasets/opencell/mae_opencell_3d_cross_attention_fft/${run_name}
ckpt_dir: ${output_dir}/ckpts

# ========================================
# Data Preprocessing & Augmentation
# ========================================

# Spatial resampling
space_x: 1.0
space_y: 1.0
space_z: 1.0

# ROI size (input size for the model)
roi_x: 176
roi_y: 176
roi_z: 100

# Intensity Normalization
channel_wise_norm: true
intensity_augmentation: true

# Intensity clipping
a_min: None
a_max: None
b_min: None
b_max: None

# Spatial Augmentation
RandFlipd_prob: 0.2
RandRotate90d_prob: 0.2

# Intensity Augmentation
RandScaleIntensityd_prob: 0.1
scale_intensity_factor: 0.1
RandShiftIntensityd_prob: 0.1
shift_intensity_offset: 0.1

# ========================================
# Trainer Configuration
# ========================================

trainer_name: MAE3DChannelCrossAttentionFFTTrainer
batch_size: 8  # Per GPU batch size (may need to reduce due to cross-attention memory)
vis_batch_size: None
start_epoch: 0
warmup_epochs: 5 # for run 2: 4
epochs: 10
workers: 8
resume: None
cache_rate: 0.0

# ========================================
# Model Architecture
# ========================================

patchembed: 'PatchEmbed3D'
pos_embed_type: 'sincos'
mask_ratio: 0.75
input_size:
  - ${roi_z}
  - ${roi_y}
  - ${roi_x}
patch_size: [10, 8, 8]  # S_Z, S_Y, S_X
in_chans: 2  # OpenCell has 2 channels: nucleus and protein

# Encoder (dual-stream with cross-attention)
encoder_embed_dim: 384
encoder_depth: 6
encoder_num_heads: 6

# Decoder (dual-stream with cross-attention)
decoder_embed_dim: 192
decoder_depth: 4
decoder_num_heads: 6

# ========================================
# Cross-Attention Settings
# ========================================

use_cross_attention: true
cross_attention_type: position_wise

# ========================================
# FFT Loss Settings
# ========================================

# Enable FFT loss on full reconstructions
use_fft_loss: true

# Target FFT loss weight (combined loss = MSE + fft_loss_weight * FFT)
# Start small (0.05-0.1) to avoid destabilizing training
fft_loss_weight: 0.15  # run2: 0.1, run1: 0.05

# FFT warmup: epochs with no FFT loss (decoupled from LR warmup)
# Set to 0 to include FFT loss from the beginning
fft_warmup_epochs: 1    # run2: 0

# Number of epochs to ramp up FFT loss weight (after fft_warmup_epochs)
# FFT weight schedule:
#   - epoch < fft_warmup_epochs: FFT weight = 0
#   - fft_warmup_epochs <= epoch < fft_warmup_epochs + fft_rampup_epochs: linear 0 -> fft_loss_weight
#   - epoch >= fft_warmup_epochs + fft_rampup_epochs: FFT weight = fft_loss_weight
fft_rampup_epochs: 2  # run_1: 1

# Use log transform on FFT magnitudes (recommended for stability)
fft_use_log: true

# ========================================
# Optimizer
# ========================================

type: adamw
lr: 1.5e-4
beta1: 0.9
beta2: 0.95
weight_decay: 0.05
grad_clip: 0.5  # run_1: 1.0
gradient_accumulation_steps: 1

# ========================================
# Logging & Checkpointing
# ========================================

vis_freq: 500
save_freq: 1
print_freq: 100

# ========================================
# Distributed Training
# ========================================

gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1

# ========================================
# Other Settings
# ========================================

seed: 42
debug: false
