# ========================================
# OpenCell MAE 3D with Channel Cross-Attention, FFT Loss, and Supervised Classification Loss
# ========================================
# This config trains a 3D Masked Autoencoder with:
# - Cross-attention between channels (nucleus and protein)
# - FFT loss on full reconstructions for better frequency learning
# - Supervised protein classification loss on encoder features
#
# The supervised loss encourages the encoder to learn protein-discriminative
# representations alongside reconstruction. Validation proteins have 0% overlap
# with training proteins, so supervised loss is only applied during training.

# Architecture
arch: vit_base_cross_attn_fft_sup_loss
enc_arch: ChannelCrossAttentionEncoder
dec_arch: ChannelCrossAttentionDecoder

# WandB Logging
proj_name: mae3d_cross_attention_fft_sup_loss
run_name: ${proj_name}_${arch}_${dataset}_mask${mask_ratio}_fft${fft_loss_weight}_sup${sup_loss_weight}_run1
wandb_id: None

# Dataset
dataset: opencell
json_list: null
data_path: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/opencell_dataset/single_cells/single_cell_dataset
csv_path: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/opencell_dataset/single_cells/metadata/dataset1/

# Output
output_dir: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/mae_opencell_3d_cross_attention_fft_sup_loss/${run_name}
ckpt_dir: ${output_dir}/ckpts

# ========================================
# Data Preprocessing & Augmentation
# ========================================

# Spatial resampling
space_x: 1.0
space_y: 1.0
space_z: 1.0

# ROI size (input size for the model)
roi_x: 176
roi_y: 176
roi_z: 100

# Intensity Normalization
channel_wise_norm: true
intensity_augmentation: true

# Intensity clipping
a_min: None
a_max: None
b_min: None
b_max: None

# Spatial Augmentation
RandFlipd_prob: 0.2
RandRotate90d_prob: 0.2

# Intensity Augmentation
RandScaleIntensityd_prob: 0.1
scale_intensity_factor: 0.1
RandShiftIntensityd_prob: 0.1
shift_intensity_offset: 0.1

# ========================================
# Trainer Configuration
# ========================================

trainer_name: MAE3DChannelCrossAttentionFFTSupLossTrainer
batch_size: 8  # Per GPU batch size
vis_batch_size: None
start_epoch: 0
warmup_epochs: 5
epochs: 10
workers: 8
resume: null  # Train from scratch
cache_rate: 0.0

# ========================================
# Model Architecture
# ========================================

patchembed: 'PatchEmbed3D'
pos_embed_type: 'sincos'
mask_ratio: 0.75
input_size:
  - ${roi_z}
  - ${roi_y}
  - ${roi_x}
patch_size: [10, 8, 8]  # S_Z, S_Y, S_X
in_chans: 2  # OpenCell has 2 channels: nucleus and protein

# Encoder (dual-stream with cross-attention)
encoder_embed_dim: 384
encoder_depth: 6
encoder_num_heads: 6

# Decoder (dual-stream with cross-attention)
decoder_embed_dim: 192
decoder_depth: 4
decoder_num_heads: 6

# ========================================
# Cross-Attention Settings
# ========================================

use_cross_attention: true
cross_attention_type: position_wise

# ========================================
# FFT Loss Settings
# ========================================

use_fft_loss: true
fft_loss_weight: 0.1
fft_warmup_epochs: 1
fft_rampup_epochs: 2
fft_use_log: true

# ========================================
# Supervised Classification Loss Settings
# ========================================

num_classes: 1048
sup_loss_weight: 0.1
sup_pool_mode: concat
sup_loss_label_smoothing: 0.1
return_protein_label: true

# ========================================
# Optimizer
# ========================================

type: adamw
lr: 1.5e-4
beta1: 0.9
beta2: 0.95
weight_decay: 0.05
grad_clip: 0.5
gradient_accumulation_steps: 1

# ========================================
# Logging & Checkpointing
# ========================================

vis_freq: 500
save_freq: 1
print_freq: 100

# ========================================
# Distributed Training
# ========================================

gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1

# ========================================
# Other Settings
# ========================================

seed: 42
debug: false
