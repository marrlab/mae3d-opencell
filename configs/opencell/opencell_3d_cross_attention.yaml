# ========================================
# OpenCell MAE 3D with Channel Cross-Attention
# ========================================
# This config trains a 3D Masked Autoencoder with cross-attention between
# channels (nucleus and protein). Each channel is processed as a separate
# token stream, with cross-attention allowing information exchange.

# Architecture
arch: vit_base_cross_attn
enc_arch: ChannelCrossAttentionEncoder
dec_arch: ChannelCrossAttentionDecoder

# WandB Logging
proj_name: mae3d_cross_attention
run_name: ${proj_name}_${arch}_${dataset}_mask${mask_ratio}
wandb_id: None

# Dataset
dataset: opencell
json_list: null
data_path: /path/to/datasets/opencell/opencell_dataset/single_cells/single_cell_dataset
csv_path: /path/to/datasets/opencell/opencell_dataset/single_cells/metadata/dataset1/

# Output
output_dir: /path/to/datasets/opencell/mae_opencell_3d_cross_attention/${run_name}
ckpt_dir: ${output_dir}/ckpts

# ========================================
# Data Preprocessing & Augmentation
# ========================================

# Spatial resampling
space_x: 1.0
space_y: 1.0
space_z: 1.0

# ROI size (input size for the model)
roi_x: 176
roi_y: 176
roi_z: 100

# Intensity Normalization
channel_wise_norm: true
intensity_augmentation: true

# Intensity clipping
a_min: None
a_max: None
b_min: None
b_max: None

# Spatial Augmentation
RandFlipd_prob: 0.2
RandRotate90d_prob: 0.2

# Intensity Augmentation
RandScaleIntensityd_prob: 0.1
scale_intensity_factor: 0.1
RandShiftIntensityd_prob: 0.1
shift_intensity_offset: 0.1

# ========================================
# Trainer Configuration
# ========================================

trainer_name: MAE3DChannelCrossAttentionTrainer
batch_size: 2  # Per GPU batch size (may need to reduce due to cross-attention memory)
vis_batch_size: None
start_epoch: 0
warmup_epochs: 1
epochs: 10
workers: 8
resume: None
cache_rate: 0.0

# ========================================
# Model Architecture
# ========================================

patchembed: 'PatchEmbed3D'
pos_embed_type: 'sincos'
mask_ratio: 0.75  # Same mask ratio as other experiments
input_size:
  - ${roi_z}
  - ${roi_y}
  - ${roi_x}
patch_size: [10, 8, 8]  # S_Z, S_Y, S_X
in_chans: 2  # OpenCell has 2 channels: nucleus and protein

# Encoder (dual-stream with cross-attention)
encoder_embed_dim: 384
encoder_depth: 6
encoder_num_heads: 6

# Decoder (dual-stream with cross-attention)
decoder_embed_dim: 192
decoder_depth: 4
decoder_num_heads: 6

# ========================================
# Cross-Attention Specific Settings
# ========================================

# Cross-attention is enabled by using MAE3DChannelCrossAttention model
# Each channel (nucleus, protein) has its own token stream
# Cross-attention allows channels to exchange information at each layer
use_cross_attention: true

# Cross-attention type:
#   'position_wise': Each position attends only to the SAME position in other channel
#                    - Captures co-localization of nucleus and protein
#                    - Memory efficient: O(N) instead of O(N²)
#                    - Biologically meaningful: relates signals at same (z,y,x) location
#   'full': Each position attends to ALL positions in other channel
#           - More expressive but O(N²) memory
cross_attention_type: position_wise

# ========================================
# Optimizer
# ========================================

type: adamw
lr: 1.5e-4
beta1: 0.9
beta2: 0.95
weight_decay: 0.05
grad_clip: 1.0
gradient_accumulation_steps: 1

# ========================================
# Logging & Checkpointing
# ========================================

vis_freq: 500
save_freq: 1
print_freq: 100

# ========================================
# Distributed Training
# ========================================

gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1

# ========================================
# Other Settings
# ========================================

seed: 42
debug: false
