# ============================================================================
# PPI (Protein-Protein Interaction) Prediction - SubCell Embeddings
# ============================================================================
# Trains a metric learning head for PPI prediction using SubCell embeddings
# Uses PCA-reduced embeddings (1536 -> 384) for fair comparison with MAE3D
# Architecture: SubCell Embedding -> MLP Projection -> L2 Normalize -> Cosine Similarity

# architecture
arch: PPIMetricSubCell
use_subcell: true

# wandb
proj_name: opencell_ppi
run_name: ppi_subcell_pca384
wandb_id: None

# dataset
dataset: subcell_ppi
embedding_dir: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/subcell_pca384
csv_path: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/opencell_dataset/single_cells/metadata/dataset1/
ppi_csv_path: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/opencell_metadata_raw/protein-protein-interactions/opencell-protein-interactions.csv
abundance_csv_path: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/opencell_metadata_raw/protein-abundance/opencell-protein-abundance.csv

# PPI filtering thresholds
pval_threshold: 5.0  # Minimum -log10(pval) threshold
enrichment_threshold: 2.5  # Minimum enrichment threshold
stoichiometry_threshold: 0.05  # Minimum interaction_stoichiometry threshold

# Negative sampling
n_abundance_buckets: 10  # Number of buckets for abundance-matched negative sampling
n_negatives_per_positive: 1  # Ratio of negative to positive pairs

# output
output_dir: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/ppi_results/${run_name}
ckpt_dir: ${output_dir}/ckpts

# trainer
trainer_name: PPISubCellTrainer
batch_size: 256  # Can use larger batch size since no image loading
start_epoch: 0
warmup_epochs: 2
epochs: 50
workers: 4
resume: None
eval_freq: 1

# Embedding dimension (after PCA)
embed_dim: 384  # SubCell embedding dimension after PCA

# Projection head configuration
proj_hidden_dim: 512  # Hidden layer dimension in MLP
proj_output_dim: 128  # Final embedding dimension for similarity computation
proj_num_layers: 2    # Number of MLP layers (2 or 3)

# Loss function
loss_type: 'contrastive'  # Options: 'contrastive', 'cosine', 'bce'
margin: 0.5  # Margin for contrastive loss
temperature: 0.1  # Temperature for BCEWithLogits loss

# optimizer
lr: 1e-3  # Higher LR since only training projection head
beta1: 0.9
beta2: 0.999
weight_decay: 0.05
gradient_accumulation_steps: 1

# logging
save_freq: 5
print_freq: 50

# distributed processing
gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1

# randomness
seed: 42

# debugging
debug: false
