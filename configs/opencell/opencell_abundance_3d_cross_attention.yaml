# ============================================================================
# Protein Abundance Prediction - 3D MAE with Cross-Attention
# ============================================================================
# Predicts protein concentration using pretrained MAE3D with channel cross-attention

# architecture
arch: ViT3DCrossAttentionClassifier
use_2d: false

# Cross-attention specific settings
cross_attention_type: 'position_wise'
pool_mode: 'concat'

# wandb
proj_name: opencell_abundance
run_name: abundance_3d_cross_attention_mae_mask${pretrain_mask_ratio}
wandb_id: None
pretrain_mask_ratio: 0.75

# dataset
dataset: opencell_abundance
csv_path: /path/to/datasets/opencell/opencell_dataset/single_cells/metadata/dataset1/
abundance_csv_path: /path/to/datasets/opencell/opencell_metadata_raw/protein-abundance/opencell-protein-abundance.csv

# target configuration
target_column: 'hek_protein_conc_nm'
log_transform: true
normalize_target: true

# output
output_dir: /path/to/datasets/opencell/abundance_results/${run_name}
ckpt_dir: ${output_dir}/ckpts

# ========================================
# Data Preprocessing & Augmentation
# ========================================
channel_wise_norm: true
intensity_augmentation: true

a_min: None
a_max: None
b_min: None
b_max: None

RandFlipd_prob: 0.2
RandRotate90d_prob: 0.2
RandScaleIntensityd_prob: 0.1
scale_intensity_factor: 0.1
RandShiftIntensityd_prob: 0.1
shift_intensity_offset: 0.1

# trainer
trainer_name: AbundanceTrainer
batch_size: 8
start_epoch: 0
warmup_epochs: 2
epochs: 50
workers: 8
resume: None
cache_rate: 0.0
eval_freq: 1

# model architecture (should match pretrained MAE3D cross-attention)
input_size:
  - 100
  - 176
  - 176
patch_size: [10, 8, 8]
in_chans: 2
encoder_embed_dim: 384
encoder_depth: 6
encoder_num_heads: 6
pos_embed_type: 'sincos'
use_global_pool: true
drop_path: 0.1

# pretrained weights from MAE3D cross-attention model
pretrain: /path/to/datasets/opencell/mae_opencell_3d_cross_attention/mae3d_cross_attention_vit_base_cross_attn_opencell_mask0.75/mae3d_cross_attention_vit_base_cross_attn_opencell_mask0.75/ckpts/checkpoint_0009.pth.tar

# fine-tuning strategy
freeze_encoder: true

# optimizer
lr: 1e-3
beta1: 0.9
beta2: 0.999
weight_decay: 0.05
gradient_accumulation_steps: 1

# logging
save_freq: 5
print_freq: 50

# distributed processing
gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1

# randomness
seed: 42

# debugging
debug: false
