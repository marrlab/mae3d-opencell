# ========================================
# OpenCell MAE 3D Configuration
# ========================================
# This config is for training a 3D Masked Autoencoder on OpenCell dataset

# Architecture
arch: vit_base
enc_arch: MAEViTEncoder
dec_arch: MAEViTDecoder

# WandB Logging
proj_name: mae3d
run_name: ${proj_name}_${arch}_${dataset}_mask${mask_ratio}_5_8_8_patch_size
wandb_id: None

# Dataset
dataset: opencell
json_list: null  # Not used for OpenCell (uses CSV files instead)
data_path: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/opencell_dataset/single_cells/single_cell_dataset
csv_path: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/opencell_dataset/single_cells/metadata/dataset1/

# Output
output_dir: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/opencell/mae_opencell_3d/${run_name}
ckpt_dir: ${output_dir}/ckpts

# ========================================
# Data Preprocessing & Augmentation
# ========================================

# Spatial resampling (currently disabled with 1.0 spacing)
space_x: 1.0
space_y: 1.0
space_z: 1.0

# ROI size (input size for the model)
roi_x: 176
roi_y: 176
roi_z: 100

# Intensity Normalization (NEW - CRITICAL for multi-channel data)
# Channel-wise normalization ensures nucleus and protein channels are normalized independently
channel_wise_norm: true  # RECOMMENDED: Set to true for proper multi-channel handling
intensity_augmentation: true  # Apply random intensity scaling/shifting for robustness

# Optional: Intensity clipping (set to actual values if needed, otherwise keep as None)
# Use these to clip extreme intensity values before normalization
a_min: None  # Min intensity to clip (e.g., -175.0 for CT scans)
a_max: None  # Max intensity to clip (e.g., 250.0)
b_min: None  # Target min after scaling (e.g., 0.0)
b_max: None  # Target max after scaling (e.g., 1.0)

# Spatial Augmentation
RandFlipd_prob: 0.2
RandRotate90d_prob: 0.2

# Intensity Augmentation (NEW - applied if intensity_augmentation=true)
RandScaleIntensityd_prob: 0.1  # Probability of random intensity scaling
scale_intensity_factor: 0.1     # Factor for intensity scaling
RandShiftIntensityd_prob: 0.1  # Probability of random intensity shifting
shift_intensity_offset: 0.1     # Offset for intensity shifting

# ========================================
# Trainer Configuration
# ========================================

trainer_name: MAE3DTrainer
batch_size: 2  # Per GPU batch size
vis_batch_size: None  # 1
start_epoch: 0
warmup_epochs: 1  # Warmup for X epochs
epochs: 10  # Total training epochs
workers: 8
resume: None
cache_rate: 0.0  # Fraction of dataset to cache in RAM (0.0=no caching, 1.0=cache all)

# ========================================
# Model Architecture
# ========================================

patchembed: 'PatchEmbed3D'
pos_embed_type: 'sincos'
mask_ratio: 0.75
input_size:
  - ${roi_z}
  - ${roi_y}
  - ${roi_x}
patch_size: [10, 8, 8]  # S_Z, S_Y, S_X
in_chans: 2  # OpenCell has 2 channels: nucleus and protein

# Encoder (smaller than standard ViT-Base for faster training)
encoder_embed_dim: 384  # 768 for ViT-Base
encoder_depth: 6  # 12 for ViT-Base
encoder_num_heads: 6  # 12 for ViT-Base

# Decoder
decoder_embed_dim: 192  # 384 for ViT-Base decoder
decoder_depth: 4  # 8 for ViT-Base decoder
decoder_num_heads: 6  # 12 for ViT-Base decoder

# ========================================
# Optimizer
# ========================================

type: adamw
lr: 1.5e-4  # Standard MAE learning rate
beta1: 0.9
beta2: 0.95
weight_decay: 0.05
grad_clip: 1.0  # Gradient clipping max norm (0 or None to disable)
gradient_accumulation_steps: 1  # Number of steps to accumulate gradients (1=no accumulation)

# ========================================
# Logging & Checkpointing
# ========================================

vis_freq: 500  # Visualize MAE reconstructions every N steps
save_freq: 1  # Save checkpoint every epoch
print_freq: 100

# ========================================
# Distributed Training
# ========================================
# These are set by train_with_trainer.py at runtime

gpu: 0  # Will be overridden by LOCAL_RANK
dist_url: null
world_size: 1  # Number of GPUs (will be overridden by torchrun)
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0  # Will be overridden by RANK
ngpus_per_node: 1

# ========================================
# Other Settings
# ========================================

seed: 42
debug: false
