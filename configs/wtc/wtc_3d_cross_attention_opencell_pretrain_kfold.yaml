# ========================================
# WTC-11 MAE architecture config — OpenCell pretrained (zero-shot transfer)
# ========================================
#
# Used ONLY to instantiate the model structure for embedding extraction.
# The actual weights are loaded from an OpenCell-trained CLIP checkpoint.
#
# OpenCell trained on (100, 176, 176) with patch_size [10, 8, 8].
# WTC images are (80, 224, 224) — same patch_size, different grid.
#
# Position embeddings (nn.Parameter, size-dependent) are re-initialised
# via sincos for the WTC grid (8, 28, 28); all other encoder weights
# (patch projection, transformer blocks, layer norms) load cleanly from
# the OpenCell checkpoint via strict=False.
#
# Usage (per fold):
#   python src/extract_mae_embeddings_wtc.py \
#       --config  configs/wtc/wtc_3d_cross_attention_opencell_pretrain_kfold.yaml \
#       --checkpoint /ictstr01/.../opencell/mae_opencell_3d_cross_attention_clip_kfold5/run3/fold0/ckpts/checkpoint_0004.pth.tar \
#       --output_dir /ictstr01/.../wtc11/mae_wtc_3d_opencell_pretrain/fold0/mae3d_embeddings \
#       --csv_path   /ictstr01/.../wtc11/kfold5/fold0 \
#       --model_type mae3d_cross_attention \
#       --pool_mode  concat

# Architecture (matches OpenCell CLIP checkpoint)
arch: vit_base_cross_attn
enc_arch: ChannelCrossAttentionEncoder
dec_arch: ChannelCrossAttentionDecoder

# WandB (not used during extraction, kept for consistency)
proj_name: wtc_opencell_pretrain_embed
run_name: ${proj_name}_zero_shot
wandb_id: None

# Dataset
dataset: wtc
json_list: null
data_path: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/wtc11
csv_path: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/wtc11/kfold5/fold0

# Output (overridden per-fold by extraction script)
output_dir: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/wtc11/mae_wtc_3d_opencell_pretrain/fold0/mae3d_embeddings
ckpt_dir: ${output_dir}/ckpts

# ========================================
# Data Preprocessing (WTC-11 target size)
# ========================================

space_x: 1.0
space_y: 1.0
space_z: 1.0

roi_x: 224
roi_y: 224
roi_z: 80

channel_wise_norm: true
intensity_augmentation: false

a_min: None
a_max: None
b_min: None
b_max: None

RandFlipd_prob: 0.0
RandRotate90d_prob: 0.0
RandScaleIntensityd_prob: 0.0
scale_intensity_factor: 0.0
RandShiftIntensityd_prob: 0.0
shift_intensity_offset: 0.0

# ========================================
# Model Architecture
# — must match the OpenCell CLIP checkpoint exactly (except input_size)
# ========================================

patchembed: 'PatchEmbed3D'
pos_embed_type: 'sincos'
mask_ratio: 0.75

# WTC input size: (Z=80, Y=224, X=224)
# Patch grid: (8, 28, 28) = 6272 patches  [vs OpenCell (10, 22, 22) = 4840]
input_size:
  - ${roi_z}
  - ${roi_y}
  - ${roi_x}

# Patch size MUST match the OpenCell checkpoint (10 in Z, 8 in Y/X)
patch_size: [10, 8, 8]
in_chans: 2

encoder_embed_dim: 384
encoder_depth: 6
encoder_num_heads: 6

decoder_embed_dim: 192
decoder_depth: 4
decoder_num_heads: 6

# ========================================
# Cross-Attention (matches OpenCell checkpoint)
# ========================================

use_cross_attention: true
cross_attention_type: position_wise

# CLIP / ESM2 placeholders (not used during extraction)
use_esm2_conditioning: false
esm2_embed_dim: 1280
esm2_embedding_path: None
use_clip_loss: false
clip_embed_dim: 1280
clip_weight: 1.0
clip_rampup_epochs: 1
clip_temperature_init: 0.07

# ========================================
# Other
# ========================================

resume: None
seed: 42
debug: false

gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1
