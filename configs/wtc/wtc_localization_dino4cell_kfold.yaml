# WTC-11 localization — DINO4Cell PCA-384 embeddings, k-fold.
#
# Linear probe on pre-extracted DINO4Cell embeddings reduced to 384-dim via PCA.
# Head: Linear(384, 15).  pool_mode='mean' → head_input_dim = encoder_embed_dim = 384.
#
# Prerequisites:
#   1. sbatch scripts/wtc/preprocess_dino4cell_pca384_wtc.sbatch
#   2. sbatch --array=0-4 scripts/wtc/train_localization_dino4cell_kfold.sbatch

# architecture
arch: ViT3DCrossAttentionClassifier
use_2d: false
cross_attention_type: 'position_wise'
pool_mode: 'mean'       # head input dim = encoder_embed_dim = 384

# wandb
proj_name: wtc_localization_dino4cell_kfold
run_name: ${proj_name}_fold0
wandb_id: None

# dataset
dataset: wtc_localization
csv_path: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/wtc11/kfold5/fold0

# output
output_dir: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/wtc11/localization_dino4cell_pca384_kfold5/fold0
ckpt_dir: ${output_dir}/ckpts

# embedding path (overridden per fold via --mae_embedding_path)
mae_embedding_path: None

# augmentation — not used in embedding mode
channel_wise_norm: true
intensity_augmentation: false
a_min: None
a_max: None
b_min: None
b_max: None
RandFlipd_prob: 0.0
RandRotate90d_prob: 0.0
RandScaleIntensityd_prob: 0.0
scale_intensity_factor: 0.0
RandShiftIntensityd_prob: 0.0
shift_intensity_offset: 0.0

# trainer
trainer_name: LocalizationWTCTrainer
batch_size: 256
start_epoch: 0
warmup_epochs: 5
epochs: 100
workers: 4
resume: None
cache_rate: 0.0
eval_freq: 1

# model architecture — only the head is used in embedding mode
input_size: [80, 224, 224]
patch_size: [10, 8, 8]
in_chans: 2
num_classes: 15          # WTC has 15 localization categories
encoder_embed_dim: 384
encoder_depth: 6
encoder_num_heads: 6
pos_embed_type: 'sincos'
use_global_pool: true
drop_path: 0.0

# No grade weights (single-label WTC)
grade_weights: None

pretrain: None
freeze_encoder: true

# optimizer
lr: 1e-3
beta1: 0.9
beta2: 0.999
weight_decay: 0.05
gradient_accumulation_steps: 1

# logging
save_freq: 10
print_freq: 20

# distributed
gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1

seed: 42
debug: false
