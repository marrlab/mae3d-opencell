# ========================================
# WTC-11 MAE 3D with Channel Cross-Attention and FFT Loss — K-Fold
# ========================================
# Trains on full 3D WTC-11 single-cell volumes (80 x 224 x 224) with:
# - Position-wise cross-attention between DNA and protein channels
# - FFT loss for better frequency-domain reconstruction
#
# Input after preprocessing: (B, 2, 80, 224, 224)
# Patch grid: Z=80/10=8, Y=224/8=28, X=224/8=28 → 8*28*28=6272 patches/channel
#
# Submit as a SLURM array job:
#   sbatch --array=0-4 scripts/wtc/train_mae3d_cross_attention_fft_kfold_1gpu.sbatch
#
# Prerequisites:
#   1. Create 5-fold CSV splits:
#        python src/wtc/create_wtc_folds.py
#        python src/wtc/create_wtc_kfold_csvs.py

# Architecture
arch: vit_base_cross_attn_fft
enc_arch: ChannelCrossAttentionEncoder
dec_arch: ChannelCrossAttentionDecoder

# WandB Logging
proj_name: mae3d_cross_attention_fft_kfold
run_name: ${proj_name}_${arch}_${dataset}_mask${mask_ratio}_fft${fft_loss_weight}
wandb_id: None

# Dataset
dataset: wtc
json_list: null
data_path: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/wtc11
csv_path: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/wtc11/kfold5/fold0

# Output (overridden per-fold by the training script)
output_dir: /ictstr01/groups/labs/marr/qscd01/datasets/SingleCellImagesDataset/wtc11/mae_wtc_3d_cross_attention_fft_kfold5/${run_name}
ckpt_dir: ${output_dir}/ckpts

# ========================================
# Data Preprocessing & Augmentation
# ========================================

space_x: 1.0
space_y: 1.0
space_z: 1.0

roi_x: 224
roi_y: 224
roi_z: 80

channel_wise_norm: true
intensity_augmentation: true

a_min: None
a_max: None
b_min: None
b_max: None

RandFlipd_prob: 0.2
RandRotate90d_prob: 0.2

RandScaleIntensityd_prob: 0.1
scale_intensity_factor: 0.1
RandShiftIntensityd_prob: 0.1
shift_intensity_offset: 0.1

# ========================================
# Trainer Configuration
# ========================================

trainer_name: MAE3DChannelCrossAttentionFFTWTCTrainer
batch_size: 3  # 4  # 8
vis_batch_size: None
start_epoch: 0
warmup_epochs: 4
epochs: 10
workers: 8
resume: None
cache_rate: 0.0

# ========================================
# Model Architecture (3D)
# ========================================

patchembed: 'PatchEmbed3D'
pos_embed_type: 'sincos'
mask_ratio: 0.75
input_size:
  - ${roi_z}
  - ${roi_y}
  - ${roi_x}
patch_size: [8, 8, 8]
in_chans: 2

encoder_embed_dim: 384
encoder_depth: 6
encoder_num_heads: 6

decoder_embed_dim: 192
decoder_depth: 4
decoder_num_heads: 6

# ========================================
# Cross-Attention Settings
# ========================================

use_cross_attention: true
cross_attention_type: position_wise

# ========================================
# FFT Loss Settings
# ========================================

use_fft_loss: true
fft_loss_weight: 0.1
fft_warmup_epochs: 0
fft_rampup_epochs: 2
fft_use_log: true

# ========================================
# Optimizer
# ========================================

type: adamw
lr: 1.5e-4
beta1: 0.9
beta2: 0.95
weight_decay: 0.05
grad_clip: 0.5
gradient_accumulation_steps: 1

# ========================================
# Logging & Checkpointing
# ========================================

vis_freq: 500
save_freq: 1
print_freq: 100

# ========================================
# Distributed Training
# ========================================

gpu: 0
dist_url: null
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed: false
rank: 0
ngpus_per_node: 1

# ========================================
# Other Settings
# ========================================

seed: 42
debug: false
